<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abex · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #121212;
  --surface2: #1a1a1a;
  --border: #222;
  --text: #f0f0f0;
  --muted: #555;
  --accent: #00e676;
  --warn: #ff9800;
  --danger: #f44336;
  --blue: #2979ff;
  --purple: #7c4dff;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { background:var(--bg); color:var(--text); font-family:var(--font); display:flex; flex-direction:column; }

/* TOPBAR */
#topbar {
  height:52px; background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0;
}
.logo { font-size:15px; font-weight:800; letter-spacing:0.05em; }
.logo span { color:var(--accent); }
#topbar-date { font-size:12px; color:var(--muted); font-family:var(--mono); margin-left:auto; }
#topbar-update { font-size:11px; color:var(--muted); font-family:var(--mono); }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; display:inline-block; margin-right:6px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN SPLIT */
#main {
  flex:1; display:grid; grid-template-columns:1fr 1fr;
  overflow:hidden; min-height:0;
}

/* LADO ESQUERDO */
#left {
  padding:24px; display:flex; flex-direction:column; gap:16px;
  border-right:1px solid var(--border); overflow-y:auto;
}
#left::-webkit-scrollbar { width:4px; }
#left::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.section-label {
  font-size:10px; font-family:var(--mono); color:var(--muted);
  text-transform:uppercase; letter-spacing:0.12em;
}

/* Cards grandes */
.big-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.big-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px; position:relative; overflow:hidden;
}
.big-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--card-color, var(--border));
}
.big-card.full-width { grid-column:span 2; }
.card-label { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; }
.card-val { font-size:38px; font-weight:800; line-height:1; }
.card-sub { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:6px; }

/* Cards envio */
.envio-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.envio-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:14px; text-align:center;
}
.envio-icon {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 8px; font-size:14px;
}
.envio-label { font-size:10px; font-family:var(--mono); color:var(--muted); margin-bottom:4px; }
.envio-val { font-size:24px; font-weight:800; }

.full-icon { background:#ff980022; }
.full-val { color:#ff9800; }
.flex-icon { background:#2979ff22; }
.flex-val { color:#2979ff; }
.coleta-icon { background:#7c4dff22; }
.coleta-val { color:#7c4dff; }
.turbo-icon { background:#f4433622; }
.turbo-val { color:#f44336; }

/* LADO DIREITO */
#right { display:flex; flex-direction:column; overflow:hidden; }
#right-header {
  padding:16px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
#right-header h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
#feed-count { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:auto; }

#feed {
  flex:1; overflow-y:auto; padding:12px 16px;
  display:flex; flex-direction:column; gap:8px;
}
#feed::-webkit-scrollbar { width:4px; }
#feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.venda-item {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px; transition:border-color 0.15s;
  animation:slideIn 0.25s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.venda-item:hover { border-color:#333; }
.venda-foto {
  width:48px; height:48px; border-radius:8px; background:var(--surface2);
  object-fit:contain; flex-shrink:0;
}
.venda-foto-placeholder {
  width:48px; height:48px; border-radius:8px; background:var(--surface2);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:20px;
}
.venda-info { flex:1; min-width:0; }
.venda-nome { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.venda-sku { font-size:10px; color:var(--muted); font-family:var(--mono); margin-top:2px; }
.venda-data { font-size:10px; color:var(--muted); font-family:var(--mono); margin-top:1px; }
.venda-right { text-align:right; flex-shrink:0; }
.venda-qtd { font-size:11px; color:var(--muted); font-family:var(--mono); }
.envio-badge {
  display:inline-block; font-size:9px; font-family:var(--mono);
  padding:2px 7px; border-radius:4px; margin-top:5px; font-weight:500;
}
.badge-full    { background:#ff980018; color:#ff9800; border:1px solid #ff980040; }
.badge-flex    { background:#2979ff18; color:#2979ff; border:1px solid #2979ff40; }
.badge-coleta  { background:#7c4dff18; color:#7c4dff; border:1px solid #7c4dff40; }
.badge-turbo   { background:#f4433618; color:#f44336; border:1px solid #f4433640; }
.badge-outros  { background:#55555518; color:#777;    border:1px solid #55555540; }

.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:8px; color:var(--muted);
  font-family:var(--mono); font-size:12px; text-align:center;
  padding:48px;
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">AB<span>EX</span></div>
  <div id="topbar-date"></div>
  <div id="topbar-update"><span class="live-dot"></span>aguardando dados...</div>
</div>

<div id="main">
  <!-- ESQUERDA -->
  <div id="left">
    <div class="section-label">resumo do dia</div>

    <div class="big-cards">
      <div class="big-card" style="--card-color:var(--accent)">
        <div class="card-label">Vendas hoje</div>
        <div class="card-val" id="val-qtd" style="color:var(--accent)">—</div>
        <div class="card-sub">itens vendidos</div>
      </div>
      <div class="big-card" style="--card-color:var(--blue)">
        <div class="card-label">Valor total</div>
        <div class="card-val" id="val-total" style="color:var(--blue);font-size:26px;">—</div>
        <div class="card-sub">receita do dia</div>
      </div>
    </div>

    <div class="section-label" style="margin-top:4px;">por tipo de envio</div>

    <div class="envio-grid">
      <div class="envio-card">
        <div class="envio-icon full-icon">🟠</div>
        <div class="envio-label">Full</div>
        <div class="envio-val full-val" id="val-full">—</div>
      </div>
      <div class="envio-card">
        <div class="envio-icon flex-icon">🔵</div>
        <div class="envio-label">Flex</div>
        <div class="envio-val flex-val" id="val-flex">—</div>
      </div>
      <div class="envio-card">
        <div class="envio-icon coleta-icon">🟣</div>
        <div class="envio-label">Coleta</div>
        <div class="envio-val coleta-val" id="val-coleta">—</div>
      </div>
      <div class="envio-card">
        <div class="envio-icon turbo-icon">🔴</div>
        <div class="envio-label">Turbo</div>
        <div class="envio-val turbo-val" id="val-turbo">—</div>
      </div>
    </div>
  </div>

  <!-- DIREITA -->
  <div id="right">
    <div id="right-header">
      <span class="live-dot"></span>
      <h3>Vendas ao vivo</h3>
      <span id="feed-count"></span>
    </div>
    <div id="feed">
      <div class="empty-state">Carregando vendas...</div>
    </div>
  </div>
</div>

<script>
let pedidos = [];

function fmt(v) {
  return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function badgeEnvio(envio) {
  const e = (envio||'').toLowerCase();
  if (e === 'full')   return '<span class="envio-badge badge-full">Full</span>';
  if (e === 'flex')   return '<span class="envio-badge badge-flex">Flex</span>';
  if (e === 'coleta') return '<span class="envio-badge badge-coleta">Coleta</span>';
  if (e === 'turbo')  return '<span class="envio-badge badge-turbo">Turbo</span>';
  return '<span class="envio-badge badge-outros">N/A</span>';
}

function renderDashboard() {
  if (!pedidos.length) return;

  // Filtrar só hoje
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const hoje_pedidos = pedidos.filter(p => {
    const d = new Date(p.data); d.setHours(0,0,0,0);
    return d.getTime() === hoje.getTime();
  });

  // Métricas
  const totalQtd   = hoje_pedidos.reduce((s,p) => s + p.quantidade, 0);
  const totalValor = hoje_pedidos.reduce((s,p) => s + (p.valor * p.quantidade), 0);
  const full   = hoje_pedidos.filter(p => (p.envio||'').toLowerCase() === 'full').reduce((s,p) => s + p.quantidade, 0);
  const flex   = hoje_pedidos.filter(p => (p.envio||'').toLowerCase() === 'flex').reduce((s,p) => s + p.quantidade, 0);
  const coleta = hoje_pedidos.filter(p => (p.envio||'').toLowerCase() === 'coleta').reduce((s,p) => s + p.quantidade, 0);
  const turbo  = hoje_pedidos.filter(p => (p.envio||'').toLowerCase() === 'turbo').reduce((s,p) => s + p.quantidade, 0);

  document.getElementById('val-qtd').textContent   = totalQtd;
  document.getElementById('val-total').textContent = fmt(totalValor);
  document.getElementById('val-full').textContent   = full;
  document.getElementById('val-flex').textContent   = flex;
  document.getElementById('val-coleta').textContent = coleta;
  document.getElementById('val-turbo').textContent  = turbo;

  // Feed
  document.getElementById('feed-count').textContent = hoje_pedidos.length + ' vendas';
  const feed = document.getElementById('feed');

  if (!hoje_pedidos.length) {
    feed.innerHTML = '<div class="empty-state">Nenhuma venda hoje ainda</div>';
    return;
  }

  feed.innerHTML = hoje_pedidos.map(p => {
    const hora = p.data ? new Date(p.data).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : '';
    const data = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';
    const foto = p.foto
      ? `<img class="venda-foto" src="${p.foto}" onerror="this.style.display='none'">`
      : `<div class="venda-foto-placeholder">📦</div>`;
    return `<div class="venda-item">
      ${foto}
      <div class="venda-info">
        <div class="venda-nome">${p.produto}</div>
        <div class="venda-sku">SKU: ${p.sku}</div>
        <div class="venda-data">${data} às ${hora}</div>
      </div>
      <div class="venda-right">
        <div class="venda-qtd">Qtd: ${p.quantidade}</div>
        ${badgeEnvio(p.envio)}
      </div>
    </div>`;
  }).join('');
}

async function carregar() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/alexbocchi/abex/main/dados_tiny.json?t=' + Date.now());
    if (!res.ok) return;
    const dados = await res.json();
    pedidos = dados.pedidos || [];
    const dt = dados.atualizado_em ? new Date(dados.atualizado_em).toLocaleTimeString('pt-BR') : '';
    document.getElementById('topbar-update').innerHTML = `<span class="live-dot"></span>atualizado às ${dt}`;
    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
    renderDashboard();
  } catch(e) {}
}

carregar();
setInterval(carregar, 60000);
</script>
</body>
</html>
