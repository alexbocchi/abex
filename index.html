<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abex · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f0f0ee;
  --border: #e5e5e2;
  --text: #1a1a1a;
  --muted: #888;
  --muted2: #bbb;
  --accent: #00a651;
  --blue: #1a6ef5;
  --purple: #6c3fff;
  --orange: #e07000;
  --red: #d63a2f;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); }
body { color:var(--text); font-family:var(--font); display:flex; flex-direction:column; }

/* TOPBAR */
#topbar {
  height:54px; background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 28px; gap:12px; flex-shrink:0;
}
.logo { font-size:16px; font-weight:800; letter-spacing:0.04em; }
.logo span { color:var(--accent); }
.topbar-sep { width:1px; height:20px; background:var(--border); }
#topbar-date { font-size:12px; color:var(--muted); font-family:var(--mono); }
#topbar-update { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:auto; display:flex; align-items:center; gap:6px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* DATE SELECTOR */
#date-bar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 28px; display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.date-label { font-size:11px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.date-tabs { display:flex; gap:6px; align-items:center; }
.date-tab {
  font-size:11px; font-family:var(--mono); padding:5px 12px;
  border-radius:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--muted); cursor:pointer;
  transition:all 0.15s;
}
.date-tab:hover { border-color:var(--muted2); color:var(--text); }
.date-tab.active { background:var(--text); color:#fff; border-color:var(--text); }
#btn-cal {
  font-size:11px; font-family:var(--mono); padding:5px 12px;
  border-radius:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--muted); cursor:pointer;
  transition:all 0.15s; position:relative;
}
#btn-cal:hover { border-color:var(--muted2); color:var(--text); }

/* CALENDÁRIO */
#cal-wrapper {
  display:none; position:absolute; top:100px; left:28px; z-index:100;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:16px; box-shadow:0 8px 32px rgba(0,0,0,0.1);
  min-width:280px;
}
#cal-wrapper.open { display:block; }
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-title { font-size:13px; font-weight:700; }
.cal-nav { background:none; border:1px solid var(--border); border-radius:6px; width:28px; height:28px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.cal-nav:hover { background:var(--bg); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow { font-size:10px; font-family:var(--mono); color:var(--muted); text-align:center; padding:4px 0; text-transform:uppercase; }
.cal-day {
  font-size:12px; font-family:var(--mono); text-align:center;
  padding:6px 4px; border-radius:6px; cursor:pointer;
  transition:background 0.1s;
}
.cal-day:hover { background:var(--bg); }
.cal-day.empty { cursor:default; }
.cal-day.has-data { font-weight:600; color:var(--text); }
.cal-day.has-data:hover { background:var(--surface2); }
.cal-day.selected { background:var(--text); color:#fff; }
.cal-day.today { color:var(--accent); }
.cal-day.disabled { color:var(--muted2); cursor:default; }

/* MAIN */
#main { flex:1; display:grid; grid-template-columns:1fr 1fr; overflow:hidden; min-height:0; }

/* ESQUERDA */
#left { padding:20px; display:flex; flex-direction:column; gap:14px; border-right:1px solid var(--border); overflow-y:auto; background:var(--bg); }
#left::-webkit-scrollbar { width:4px; }
#left::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.section-label { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; }
.main-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.main-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; position:relative; overflow:hidden; }
.main-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--c, var(--border)); border-radius:14px 14px 0 0; }
.card-label { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; }
.card-val { font-size:38px; font-weight:800; line-height:1; color:var(--cv, var(--text)); }
.card-sub { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:5px; }
.envio-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.envio-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; align-items:center; gap:10px; }
.envio-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.envio-name { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; }
.envio-val { font-size:26px; font-weight:800; line-height:1; }

/* DIREITA */
#right { display:flex; flex-direction:column; overflow:hidden; background:var(--surface); }
#right-header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
#right-header h3 { font-size:13px; font-weight:700; }
#feed-count { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:auto; }
#feed { flex:1; overflow-y:auto; padding:14px 18px; display:flex; flex-direction:column; gap:8px; }
#feed::-webkit-scrollbar { width:4px; }
#feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.venda-item { display:flex; align-items:center; gap:12px; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:11px 13px; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.venda-foto { width:48px; height:48px; border-radius:9px; background:var(--surface); border:1px solid var(--border); object-fit:contain; flex-shrink:0; }
.venda-foto-ph { width:48px; height:48px; border-radius:9px; background:var(--surface2); border:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--muted2); font-size:18px; }
.venda-info { flex:1; min-width:0; }
.venda-nome { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.venda-meta { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:2px; }
.venda-hora { font-size:10px; color:var(--muted2); font-family:var(--mono); margin-top:1px; }
.venda-right { text-align:right; flex-shrink:0; }
.badge { display:inline-block; font-size:10px; font-family:var(--mono); padding:3px 8px; border-radius:6px; font-weight:500; }
.b-full   { background:#fff3e0; color:var(--orange); border:1px solid #ffd59040; }
.b-flex   { background:#e8f0fe; color:var(--blue);   border:1px solid #4285f440; }
.b-coleta { background:#f0ebff; color:var(--purple); border:1px solid #7c4dff40; }
.b-turbo  { background:#fce8e6; color:var(--red);    border:1px solid #d63a2f40; }
.b-na     { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:var(--mono); font-size:12px; }
#loading-hist { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:var(--mono); font-size:12px; gap:8px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">AB<span>EX</span></div>
  <div class="topbar-sep"></div>
  <div id="topbar-date"></div>
  <div id="topbar-update"><span class="live-dot"></span>carregando...</div>
</div>

<div id="date-bar">
  <span class="date-label">Período:</span>
  <div class="date-tabs">
    <button class="date-tab active" onclick="selecionarDia('hoje')">Hoje</button>
    <button class="date-tab" onclick="selecionarDia('ontem')">Ontem</button>
    <button id="btn-cal" onclick="toggleCal()">📅 Escolher data</button>
  </div>

  <div id="cal-wrapper">
    <div class="cal-header">
      <button class="cal-nav" onclick="mudarMes(-1)">‹</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav" onclick="mudarMes(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<div id="main">
  <div id="left">
    <div class="section-label" id="resumo-label">resumo do dia</div>
    <div class="main-cards">
      <div class="main-card" style="--c:var(--accent);--cv:var(--accent)">
        <div class="card-label">Vendas</div>
        <div class="card-val" id="val-qtd">—</div>
        <div class="card-sub">itens vendidos</div>
      </div>
      <div class="main-card" style="--c:var(--blue);--cv:var(--blue)">
        <div class="card-label">Valor total</div>
        <div class="card-val" id="val-total" style="font-size:24px">—</div>
        <div class="card-sub">receita</div>
      </div>
    </div>
    <div class="section-label">por tipo de envio</div>
    <div class="envio-grid">
      <div class="envio-card"><div class="envio-dot" style="background:var(--orange)"></div><div><div class="envio-name">Full</div><div class="envio-val" id="val-full" style="color:var(--orange)">—</div></div></div>
      <div class="envio-card"><div class="envio-dot" style="background:var(--blue)"></div><div><div class="envio-name">Flex</div><div class="envio-val" id="val-flex" style="color:var(--blue)">—</div></div></div>
      <div class="envio-card"><div class="envio-dot" style="background:var(--purple)"></div><div><div class="envio-name">Coleta</div><div class="envio-val" id="val-coleta" style="color:var(--purple)">—</div></div></div>
      <div class="envio-card"><div class="envio-dot" style="background:var(--red)"></div><div><div class="envio-name">Turbo</div><div class="envio-val" id="val-turbo" style="color:var(--red)">—</div></div></div>
    </div>
  </div>
  <div id="right">
    <div id="right-header">
      <span class="live-dot"></span>
      <h3>Vendas</h3>
      <span id="feed-count"></span>
    </div>
    <div id="feed"><div class="empty">Carregando...</div></div>
  </div>
</div>

<script>
// Estado
let pedidosHoje = [];
let pedidosHistorico = [];
let histLoaded = false;
let diaSelecionado = 'hoje';
let calMes = new Date().getMonth();
let calAno = new Date().getFullYear();
let diasComDados = new Set();

function fmt(v) { return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function badge(envio) {
  const e = (envio||'').toLowerCase();
  if (e==='full')   return '<span class="badge b-full">Full</span>';
  if (e==='flex')   return '<span class="badge b-flex">Flex</span>';
  if (e==='coleta') return '<span class="badge b-coleta">Coleta</span>';
  if (e==='turbo')  return '<span class="badge b-turbo">Turbo</span>';
  return '<span class="badge b-na">N/A</span>';
}

function getPedidosDia(data) {
  // data = 'hoje', 'ontem' ou '2026-03-15'
  let alvo;
  if (data === 'hoje') {
    alvo = new Date(); alvo.setHours(0,0,0,0);
    return pedidosHoje.filter(p => {
      const d = new Date(p.data); d.setHours(0,0,0,0);
      return d.getTime() === alvo.getTime();
    });
  }
  if (data === 'ontem') {
    alvo = new Date(); alvo.setDate(alvo.getDate()-1); alvo.setHours(0,0,0,0);
    const fonte = histLoaded ? pedidosHistorico : pedidosHoje;
    return fonte.filter(p => {
      const d = new Date(p.data); d.setHours(0,0,0,0);
      return d.getTime() === alvo.getTime();
    });
  }
  // data específica
  alvo = new Date(data + 'T00:00:00'); alvo.setHours(0,0,0,0);
  const fonte = histLoaded ? pedidosHistorico : [];
  return fonte.filter(p => {
    const d = new Date(p.data); d.setHours(0,0,0,0);
    return d.getTime() === alvo.getTime();
  });
}

function renderDashboard(pedidos, label) {
  document.getElementById('resumo-label').textContent = label || 'resumo do dia';
  const qtd   = pedidos.reduce((s,p)=>s+p.quantidade,0);
  const valor = pedidos.reduce((s,p)=>s+(p.valor*p.quantidade),0);
  const full   = pedidos.filter(p=>(p.envio||'').toLowerCase()==='full').reduce((s,p)=>s+p.quantidade,0);
  const flex   = pedidos.filter(p=>(p.envio||'').toLowerCase()==='flex').reduce((s,p)=>s+p.quantidade,0);
  const coleta = pedidos.filter(p=>(p.envio||'').toLowerCase()==='coleta').reduce((s,p)=>s+p.quantidade,0);
  const turbo  = pedidos.filter(p=>(p.envio||'').toLowerCase()==='turbo').reduce((s,p)=>s+p.quantidade,0);
  document.getElementById('val-qtd').textContent   = qtd;
  document.getElementById('val-total').textContent = fmt(valor);
  document.getElementById('val-full').textContent   = full;
  document.getElementById('val-flex').textContent   = flex;
  document.getElementById('val-coleta').textContent = coleta;
  document.getElementById('val-turbo').textContent  = turbo;
  document.getElementById('feed-count').textContent = pedidos.length + ' vendas';
  const feed = document.getElementById('feed');
  if (!pedidos.length) { feed.innerHTML='<div class="empty">Nenhuma venda neste dia</div>'; return; }
  feed.innerHTML = pedidos.map(p => {
    const hora = p.data ? new Date(p.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    const dia  = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';
    const foto = p.foto
      ? `<img class="venda-foto" src="${p.foto}" onerror="this.outerHTML='<div class=\\'venda-foto-ph\\'>📦</div>'">`
      : `<div class="venda-foto-ph">📦</div>`;
    return `<div class="venda-item">${foto}<div class="venda-info"><div class="venda-nome">${p.produto}</div><div class="venda-meta">SKU: ${p.sku} · Qtd: ${p.quantidade}</div><div class="venda-hora">${dia} às ${hora}</div></div><div class="venda-right">${badge(p.envio)}</div></div>`;
  }).join('');
}

function selecionarDia(val) {
  diaSelecionado = val;
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  if (val === 'hoje') document.querySelector('.date-tab').classList.add('active');
  if (val === 'ontem') document.querySelectorAll('.date-tab')[1].classList.add('active');
  fecharCal();

  if ((val === 'ontem' || val.match(/^\d{4}-\d{2}-\d{2}$/)) && !histLoaded) {
    document.getElementById('feed').innerHTML = '<div id="loading-hist"><span class="live-dot"></span>Carregando histórico...</div>';
    carregarHistorico().then(() => atualizarView());
    return;
  }
  atualizarView();
}

function atualizarView() {
  const pedidos = getPedidosDia(diaSelecionado);
  let label = 'resumo do dia';
  if (diaSelecionado === 'hoje') label = 'hoje — ' + new Date().toLocaleDateString('pt-BR');
  else if (diaSelecionado === 'ontem') { const d=new Date(); d.setDate(d.getDate()-1); label='ontem — '+d.toLocaleDateString('pt-BR'); }
  else label = new Date(diaSelecionado+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  renderDashboard(pedidos, label);
}

// Calendário
function toggleCal() {
  const w = document.getElementById('cal-wrapper');
  w.classList.toggle('open');
  if (w.classList.contains('open')) renderCal();
}
function fecharCal() { document.getElementById('cal-wrapper').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#cal-wrapper') && !e.target.closest('#btn-cal')) fecharCal();
});

function mudarMes(delta) { calMes += delta; if(calMes>11){calMes=0;calAno++;} if(calMes<0){calMes=11;calAno--;} renderCal(); }

function renderCal() {
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent = meses[calMes] + ' ' + calAno;
  const grid = document.getElementById('cal-grid');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html = dias.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const primeiro = new Date(calAno, calMes, 1).getDay();
  const total = new Date(calAno, calMes+1, 0).getDate();
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  for(let i=0;i<primeiro;i++) html += '<div class="cal-day empty"></div>';
  for(let d=1;d<=total;d++) {
    const dt = new Date(calAno, calMes, d); dt.setHours(0,0,0,0);
    const str = `${calAno}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dt > hoje;
    const isToday = dt.getTime() === hoje.getTime();
    const isSel = diaSelecionado === str;
    const hasData = diasComDados.has(str);
    let cls = 'cal-day';
    if (isFuture) cls += ' disabled';
    else if (isSel) cls += ' selected';
    else if (isToday) cls += ' today';
    else if (hasData) cls += ' has-data';
    const click = isFuture ? '' : `onclick="selecionarDia('${str}')"`;
    html += `<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML = html;
}

// Carregar dados
async function carregarHoje() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/alexbocchi/abex/main/dados_tiny.json?t='+Date.now());
    if (!res.ok) return;
    const dados = await res.json();
    pedidosHoje = dados.pedidos || [];
    const dt = dados.atualizado_em ? new Date(dados.atualizado_em).toLocaleTimeString('pt-BR') : '';
    document.getElementById('topbar-update').innerHTML = `<span class="live-dot"></span>atualizado às ${dt}`;
    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    if (diaSelecionado === 'hoje') atualizarView();
  } catch(e) {}
}

async function carregarHistorico() {
  if (histLoaded) return;
  try {
    const res = await fetch('https://raw.githubusercontent.com/alexbocchi/abex/main/dados_historico.json?t='+Date.now());
    if (!res.ok) return;
    const dados = await res.json();
    pedidosHistorico = dados.pedidos || [];
    histLoaded = true;
    // Mapear dias com dados
    for (const p of pedidosHistorico) {
      if (p.data) {
        const d = new Date(p.data);
        const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        diasComDados.add(str);
      }
    }
  } catch(e) {}
}

carregarHoje();
setInterval(carregarHoje, 60000);
</script>
</body>
</html>
