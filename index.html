<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abex · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f0f0ee;
  --border: #e5e5e2;
  --text: #1a1a1a;
  --muted: #888;
  --muted2: #bbb;
  --accent: #00a651;
  --blue: #1a6ef5;
  --purple: #6c3fff;
  --orange: #e07000;
  --red: #d63a2f;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); }
body { color:var(--text); font-family:var(--font); display:flex; flex-direction:column; }

/* TOPBAR */
#topbar {
  height:54px; background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 28px; gap:12px; flex-shrink:0;
}
.logo { font-size:16px; font-weight:800; letter-spacing:0.04em; color:var(--text); }
.logo span { color:var(--accent); }
.topbar-sep { width:1px; height:20px; background:var(--border); }
#topbar-date { font-size:12px; color:var(--muted); font-family:var(--mono); }
#topbar-update { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:auto; display:flex; align-items:center; gap:6px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN SPLIT */
#main {
  flex:1; display:grid; grid-template-columns:1fr 1fr;
  gap:0; overflow:hidden; min-height:0;
}

/* ESQUERDA */
#left {
  padding:24px; display:flex; flex-direction:column; gap:18px;
  border-right:1px solid var(--border); overflow-y:auto; background:var(--bg);
}
#left::-webkit-scrollbar { width:4px; }
#left::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.section-label {
  font-size:10px; font-family:var(--mono); color:var(--muted);
  text-transform:uppercase; letter-spacing:0.12em;
}

/* Cards principais */
.main-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.main-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:20px; position:relative; overflow:hidden;
}
.main-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--c, var(--border));
  border-radius:14px 14px 0 0;
}
.card-label { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
.card-val { font-size:42px; font-weight:800; line-height:1; color:var(--cv, var(--text)); }
.card-sub { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:6px; }

/* Envio cards */
.envio-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.envio-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:16px; display:flex; align-items:center; gap:12px;
}
.envio-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.envio-info { flex:1; }
.envio-name { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.envio-val { font-size:28px; font-weight:800; line-height:1; }

/* DIREITA */
#right { display:flex; flex-direction:column; overflow:hidden; background:var(--surface); }
#right-header {
  padding:18px 24px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
#right-header h3 { font-size:13px; font-weight:700; color:var(--text); }
#feed-count { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:auto; }

#feed {
  flex:1; overflow-y:auto; padding:16px 20px;
  display:flex; flex-direction:column; gap:10px;
}
#feed::-webkit-scrollbar { width:4px; }
#feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.venda-item {
  display:flex; align-items:center; gap:12px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
  transition:border-color 0.15s, box-shadow 0.15s;
  animation:fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.venda-item:hover { border-color:var(--muted2); }
.venda-foto {
  width:50px; height:50px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border);
  object-fit:contain; flex-shrink:0;
}
.venda-foto-ph {
  width:50px; height:50px; border-radius:10px;
  background:var(--surface2); border:1px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  color:var(--muted2); font-size:20px;
}
.venda-info { flex:1; min-width:0; }
.venda-nome { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.venda-meta { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:3px; }
.venda-hora { font-size:10px; color:var(--muted2); font-family:var(--mono); margin-top:2px; }
.venda-right { text-align:right; flex-shrink:0; }
.venda-qtd { font-size:12px; color:var(--muted); font-family:var(--mono); margin-bottom:6px; }

.badge {
  display:inline-block; font-size:10px; font-family:var(--mono);
  padding:3px 9px; border-radius:6px; font-weight:500;
}
.b-full   { background:#fff3e0; color:var(--orange); border:1px solid #ffd59040; }
.b-flex   { background:#e8f0fe; color:var(--blue);   border:1px solid #4285f440; }
.b-coleta { background:#f0ebff; color:var(--purple); border:1px solid #7c4dff40; }
.b-turbo  { background:#fce8e6; color:var(--red);    border:1px solid #d63a2f40; }
.b-na     { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

.empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:var(--mono); font-size:12px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">AB<span>EX</span></div>
  <div class="topbar-sep"></div>
  <div id="topbar-date"></div>
  <div id="topbar-update"><span class="live-dot"></span>carregando...</div>
</div>

<div id="main">
  <div id="left">
    <div class="section-label">resumo do dia</div>

    <div class="main-cards">
      <div class="main-card" style="--c:var(--accent);--cv:var(--accent)">
        <div class="card-label">Vendas hoje</div>
        <div class="card-val" id="val-qtd">—</div>
        <div class="card-sub">itens vendidos</div>
      </div>
      <div class="main-card" style="--c:var(--blue);--cv:var(--blue)">
        <div class="card-label">Valor total</div>
        <div class="card-val" id="val-total" style="font-size:26px">—</div>
        <div class="card-sub">receita do dia</div>
      </div>
    </div>

    <div class="section-label">por tipo de envio</div>

    <div class="envio-grid">
      <div class="envio-card">
        <div class="envio-dot" style="background:var(--orange)"></div>
        <div class="envio-info">
          <div class="envio-name">Full</div>
          <div class="envio-val" id="val-full" style="color:var(--orange)">—</div>
        </div>
      </div>
      <div class="envio-card">
        <div class="envio-dot" style="background:var(--blue)"></div>
        <div class="envio-info">
          <div class="envio-name">Flex</div>
          <div class="envio-val" id="val-flex" style="color:var(--blue)">—</div>
        </div>
      </div>
      <div class="envio-card">
        <div class="envio-dot" style="background:var(--purple)"></div>
        <div class="envio-info">
          <div class="envio-name">Coleta</div>
          <div class="envio-val" id="val-coleta" style="color:var(--purple)">—</div>
        </div>
      </div>
      <div class="envio-card">
        <div class="envio-dot" style="background:var(--red)"></div>
        <div class="envio-info">
          <div class="envio-name">Turbo</div>
          <div class="envio-val" id="val-turbo" style="color:var(--red)">—</div>
        </div>
      </div>
    </div>
  </div>

  <div id="right">
    <div id="right-header">
      <span class="live-dot"></span>
      <h3>Vendas ao vivo</h3>
      <span id="feed-count"></span>
    </div>
    <div id="feed"><div class="empty">Carregando...</div></div>
  </div>
</div>

<script>
let pedidos = [];

function fmt(v) {
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function badge(envio) {
  const e = (envio||'').toLowerCase();
  if (e==='full')   return '<span class="badge b-full">Full</span>';
  if (e==='flex')   return '<span class="badge b-flex">Flex</span>';
  if (e==='coleta') return '<span class="badge b-coleta">Coleta</span>';
  if (e==='turbo')  return '<span class="badge b-turbo">Turbo</span>';
  return '<span class="badge b-na">N/A</span>';
}

function render() {
  if (!pedidos.length) return;

  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const hp = pedidos.filter(p => {
    const d = new Date(p.data); d.setHours(0,0,0,0);
    return d.getTime() === hoje.getTime();
  });

  const qtd   = hp.reduce((s,p) => s+p.quantidade, 0);
  const valor = hp.reduce((s,p) => s+(p.valor*p.quantidade), 0);
  const full   = hp.filter(p=>(p.envio||'').toLowerCase()==='full').reduce((s,p)=>s+p.quantidade,0);
  const flex   = hp.filter(p=>(p.envio||'').toLowerCase()==='flex').reduce((s,p)=>s+p.quantidade,0);
  const coleta = hp.filter(p=>(p.envio||'').toLowerCase()==='coleta').reduce((s,p)=>s+p.quantidade,0);
  const turbo  = hp.filter(p=>(p.envio||'').toLowerCase()==='turbo').reduce((s,p)=>s+p.quantidade,0);

  document.getElementById('val-qtd').textContent   = qtd;
  document.getElementById('val-total').textContent = fmt(valor);
  document.getElementById('val-full').textContent   = full;
  document.getElementById('val-flex').textContent   = flex;
  document.getElementById('val-coleta').textContent = coleta;
  document.getElementById('val-turbo').textContent  = turbo;
  document.getElementById('feed-count').textContent = hp.length + ' vendas';

  const feed = document.getElementById('feed');
  if (!hp.length) { feed.innerHTML='<div class="empty">Nenhuma venda hoje</div>'; return; }

  feed.innerHTML = hp.map(p => {
    const hora = p.data ? new Date(p.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    const dia  = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';
    const foto = p.foto
      ? `<img class="venda-foto" src="${p.foto}" onerror="this.outerHTML='<div class=\\'venda-foto-ph\\'>📦</div>'">`
      : `<div class="venda-foto-ph">📦</div>`;
    return `<div class="venda-item">
      ${foto}
      <div class="venda-info">
        <div class="venda-nome">${p.produto}</div>
        <div class="venda-meta">SKU: ${p.sku} · Qtd: ${p.quantidade}</div>
        <div class="venda-hora">${dia} às ${hora}</div>
      </div>
      <div class="venda-right">
        ${badge(p.envio)}
      </div>
    </div>`;
  }).join('');
}

async function carregar() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/alexbocchi/abex/main/dados_tiny.json?t='+Date.now());
    if (!res.ok) return;
    const dados = await res.json();
    pedidos = dados.pedidos || [];
    const dt = dados.atualizado_em ? new Date(dados.atualizado_em).toLocaleTimeString('pt-BR') : '';
    document.getElementById('topbar-update').innerHTML = `<span class="live-dot"></span>atualizado às ${dt}`;
    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    render();
  } catch(e) {}
}

carregar();
setInterval(carregar, 60000);
</script>
</body>
</html>
